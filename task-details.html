<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Task Submission | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body class="bg-[#fcf9f8] p-6">
    <header class="max-w-xl mx-auto flex items-center gap-4 mb-8">
        <a href="tasks.html" class="text-gray-400"><span class="material-symbols-outlined">arrow_back_ios</span></a>
        <h1 class="text-xl font-bold text-gray-800">Task Details</h1>
    </header>

    <main class="max-w-xl mx-auto bg-white p-8 rounded-[40px] shadow-xl text-center space-y-6">
        <h2 id="t-title" class="text-2xl font-black text-gray-800">Loading...</h2>
        <div class="py-8 bg-blue-50 rounded-[32px]">
            <p class="text-5xl font-black text-[#003ec7]" id="timer">00s</p>
        </div>
        <a id="t-link" href="#" target="_blank" onclick="startTaskTimer()" class="block w-full py-4 bg-[#003ec7] text-white rounded-2xl font-bold">Start Task</a>
        <button id="claim-btn" disabled onclick="claimReward()" class="w-full py-5 bg-gray-100 text-gray-400 rounded-3xl font-black">Claim Reward</button>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('id');
        let taskData = null;

        db.ref('tasks/' + taskId).once('value', snap => {
            taskData = snap.val();
            if(!taskData) return;
            document.getElementById('t-title').innerText = taskData.title;
            document.getElementById('t-link').href = taskData.link;
            document.getElementById('timer').innerText = taskData.time;
        });

        function startTaskTimer() {
            let timeLeft = parseInt(taskData.time);
            const interval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    const btn = document.getElementById('claim-btn');
                    btn.disabled = false;
                    btn.className = "w-full py-5 bg-green-600 text-white rounded-3xl font-black";
                }
            }, 1000);
        }

        async function claimReward() {
            const user = auth.currentUser;
            const userRef = db.ref('users/' + user.uid);
            const snap = await userRef.once('value');
            const data = snap.val() || {};
            
            await userRef.update({
                balance: (data.balance || 0) + parseFloat(taskData.reward),
                tasksDone: (data.tasksDone || 0) + 1
            });

            // SweetAlert পপ-আপ
            Swal.fire({
                title: `অভিনন্দন, ${data.name || "User"}!`,
                text: `আপনি ৳${taskData.reward} জিতেছেন।`,
                icon: 'success',
                confirmButtonColor: '#003ec7'
            }).then(() => { window.location.href = "dashboard.html"; });
        }
    </script>
</body>
</html>
