<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Task Details | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-[#fcf9f8] p-6">
    <main id="task-box" class="max-w-xl mx-auto bg-white p-8 rounded-[40px] shadow-xl text-center space-y-6 mt-10">
        <h2 id="t-title" class="text-2xl font-black">Loading...</h2>
        <div class="py-6 bg-blue-50 rounded-3xl">
            <p class="text-4xl font-black text-blue-600" id="timer">00s</p>
            <p class="text-xs font-bold text-blue-400 uppercase tracking-widest mt-1">Wait for timer</p>
        </div>
        <a id="t-link" href="#" target="_blank" class="block w-full py-4 bg-gray-100 rounded-2xl font-bold">Visit Link First</a>
        <button id="claim-btn" disabled onclick="claimReward()" class="w-full py-5 bg-gray-200 text-gray-400 rounded-3xl font-black text-lg transition-all">Claim Reward</button>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('id');
        let taskData = null;

        db.ref('tasks/' + taskId).once('value', snap => {
            taskData = snap.val();
            document.getElementById('t-title').innerText = taskData.title;
            document.getElementById('t-link').href = taskData.link;
            startTimer(parseInt(taskData.time));
        });

        function startTimer(seconds) {
            let timeLeft = seconds;
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    const btn = document.getElementById('claim-btn');
                    btn.disabled = false;
                    btn.classList.replace('bg-gray-200', 'bg-green-600');
                    btn.classList.replace('text-gray-400', 'text-white');
                }
            }, 1000);
        }

        async function claimReward() {
            const user = auth.currentUser;
            const userRef = db.ref('users/' + user.uid);
            const snap = await userRef.once('value');
            const userData = snap.val() || {};
            const name = userData.name || "User";

            await userRef.update({
                balance: (userData.balance || 0) + parseFloat(taskData.reward),
                tasksDone: (userData.tasksDone || 0) + 1
            });

            Swal.fire({
                title: `অভিনন্দন, ${name}!`,
                text: `৳${taskData.reward} আপনার ব্যালেন্সে যোগ হয়েছে।`,
                icon: 'success',
                confirmButtonText: 'Great!'
            }).then(() => { window.location.href = "dashboard.html"; });
        }
    </script>
</body>
</html>
