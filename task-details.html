<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Task Details | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
</head>
<body class="bg-[#fcf9f8] pb-10">

    <header class="p-6 bg-white border-b flex items-center gap-4 sticky top-0 z-50">
        <a href="tasks.html" class="text-gray-400"><span class="material-symbols-outlined">arrow_back_ios</span></a>
        <h1 class="text-xl font-bold text-[#003ec7]">Task Submission</h1>
    </header>

    <main id="loading" class="p-20 text-center font-bold text-gray-400">Loading Task...</main>

    <main id="main-content" class="p-6 max-w-xl mx-auto space-y-6 hidden">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center space-y-4">
            <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 mx-auto">
                <span id="task-icon" class="material-symbols-outlined text-4xl">Ads_Click</span>
            </div>
            <div>
                <h2 class="text-2xl font-black" id="task-title">Loading Title...</h2>
                <p class="text-sm text-gray-500">নির্দেশনা মেনে কাজটি সম্পন্ন করুন।</p>
            </div>
            <div class="flex justify-center gap-8 py-4 border-y border-gray-50">
                <div class="text-center">
                    <p class="text-[10px] uppercase font-bold text-gray-400">Reward</p>
                    <p class="text-xl font-black text-green-600" id="display-reward">৳ 0.00</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase font-bold text-gray-400">Time Limit</p>
                    <p class="text-xl font-black text-blue-600" id="display-time">0s</p>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <button id="visit-btn" onclick="startTimer()" class="w-full py-4 bg-[#003ec7] text-white rounded-2xl font-bold shadow-lg">
                Visit Link & Start Timer
            </button>

            <div id="timer-box" class="hidden text-center p-4 bg-gray-100 rounded-2xl">
                <p class="text-xs font-bold text-gray-500 uppercase">Wait for</p>
                <h4 id="timer-display" class="text-3xl font-black text-blue-600">0s</h4>
            </div>

            <button id="claim-btn" disabled onclick="claimReward()" class="w-full py-4 bg-gray-200 text-gray-400 rounded-2xl font-bold cursor-not-allowed">
                Claim Reward
            </button>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // URL থেকে কোন টাস্ক সেটা বুঝে নেওয়া
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('id');

        let currentTask = null;
        let timeLeft = 0;

        if (taskId) {
            db.ref('tasks/' + taskId).once('value', snap => {
                currentTask = snap.val();
                if (currentTask) {
                    document.getElementById('task-title').innerText = currentTask.title;
                    document.getElementById('display-reward').innerText = "৳ " + parseFloat(currentTask.reward).toFixed(2);
                    document.getElementById('display-time').innerText = currentTask.time;
                    timeLeft = parseInt(currentTask.time);
                    document.getElementById('timer-display').innerText = timeLeft + "s";
                    
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                }
            });
        }

        function startTimer() {
            window.open(currentTask.link, "_blank");
            document.getElementById('visit-btn').classList.add('hidden');
            document.getElementById('timer-box').classList.remove('hidden');

            let timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    const btn = document.getElementById('claim-btn');
                    btn.disabled = false;
                    btn.classList.replace('bg-gray-200', 'bg-green-600');
                    btn.classList.replace('text-gray-400', 'text-white');
                    btn.innerText = "Claim Now!";
                }
            }, 1000);
        }

        async function claimReward() {
            const user = firebase.auth().currentUser;
            const userRef = db.ref('users/' + user.uid);
            const snap = await userRef.once('value');
            const balance = (snap.val()?.balance || 0) + parseFloat(currentTask.reward);
            
            await userRef.update({ balance: balance });
            alert("৳" + currentTask.reward + " আপনার ব্যালেন্সে যোগ হয়েছে!");
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
