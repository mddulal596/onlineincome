<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Prosper - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .editorial-gradient { background: linear-gradient(135deg, #003ec7 0%, #0052ff 100%); }
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 1.25rem; height: 1.25rem;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-0 overflow-hidden bg-white rounded-[2rem] shadow-xl border border-gray-100">
        <section class="hidden lg:flex lg:col-span-7 editorial-gradient flex-col justify-between p-16 text-white relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-12">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-2xl text-blue-700">account_balance</span>
                    </div>
                    <span class="font-headline font-black text-2xl tracking-tighter">Prosper</span>
                </div>
                <h1 class="font-headline font-extrabold text-6xl leading-[1.1] mb-6">Crafting your <br/> wealth with <br/><span class="text-green-300">precision.</span></h1>
                <p class="text-blue-100 text-xl font-light">Join the atelier of modern digital earners.</p>
            </div>
            <div class="relative z-10 text-sm opacity-80">Joined by 12,000+ artisans of finance</div>
        </section>

        <section class="col-span-1 lg:col-span-5 p-8 md:p-12 flex flex-col min-h-[600px]">
            <div id="login-view">
                <div class="mb-10">
                    <span class="text-blue-600 text-xs font-bold tracking-widest uppercase mb-2 block">The Entrance</span>
                    <h2 class="font-headline font-extrabold text-4xl tracking-tight">Welcome back</h2>
                </div>
                <form class="space-y-6" id="login-form">
                    <input class="w-full px-5 py-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-600/20" id="login-email" placeholder="Email" required type="email"/>
                    <input class="w-full px-5 py-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-600/20" id="login-password" placeholder="Password" required type="password"/>
                    <button class="w-full editorial-gradient text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:opacity-90 transition-all" type="submit">
                        <span class="btn-text">Sign In</span>
                        <div class="spinner hidden" id="login-spinner"></div>
                    </button>
                    <p class="text-red-500 text-xs text-center hidden" id="login-error"></p>
                </form>
                <p class="text-center mt-8 text-sm text-gray-500">New here? <button class="text-blue-600 font-bold" onclick="toggleAuth('signup')">Create Account</button></p>
            </div>

            <div id="signup-view" class="hidden">
                <div class="mb-10">
                    <span class="text-blue-600 text-xs font-bold tracking-widest uppercase mb-2 block">The Studio</span>
                    <h2 class="font-headline font-extrabold text-4xl tracking-tight">Become an artisan</h2>
                </div>
                <form class="space-y-5" id="signup-form">
                    <input class="w-full px-5 py-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-600/20" id="signup-name" placeholder="Full Name" required type="text"/>
                    <input class="w-full px-5 py-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-600/20" id="signup-email" placeholder="Email" required type="email"/>
                    <input class="w-full px-5 py-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-600/20" id="signup-password" placeholder="Password" required type="password"/>
                    <button class="w-full editorial-gradient text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:opacity-90 transition-all" type="submit">
                        <span class="btn-text">Join Now</span>
                        <div class="spinner hidden" id="signup-spinner"></div>
                    </button>
                    <p class="text-red-500 text-xs text-center hidden" id="signup-error"></p>
                </form>
                <p class="text-center mt-8 text-sm text-gray-500">Already have an account? <button class="text-blue-600 font-bold" onclick="toggleAuth('login')">Sign In</button></p>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        window.toggleAuth = (view) => {
            document.getElementById('login-view').classList.toggle('hidden', view === 'signup');
            document.getElementById('signup-view').classList.toggle('hidden', view === 'login');
        };

        // SIGNUP LOGIC
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const errorEl = document.getElementById('signup-error');
            const spinner = document.getElementById('signup-spinner');

            errorEl.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // সরাসরি Realtime Database-এ সেভ করা হচ্ছে
                await db.ref('users/' + user.uid).set({
                    name: name,
                    email: email,
                    balance: 0,
                    tasksDone: 0,
                    createdAt: Date.now()
                });
                
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });

        // LOGIN LOGIC
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const spinner = document.getElementById('login-spinner');

            errorEl.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorEl.textContent = "Invalid email or password";
                errorEl.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });

        // Auth State
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
