<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style> body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; } </style>
</head>
<body class="pb-32">
    <header class="fixed top-0 w-full bg-white border-b px-6 py-4 z-50 flex justify-between items-center">
        <h1 class="font-black text-[#003ec7] text-xl">Prosper</h1>
        <div class="w-9 h-9 rounded-full bg-blue-50 overflow-hidden border">
            <img id="user-avatar" src="" alt="U">
        </div>
    </header>

    <main class="pt-24 px-6 max-w-5xl mx-auto space-y-6">
        <section>
            <h2 id="user-name" class="text-3xl font-black text-gray-800">Loading...</h2>
            <p id="user-email" class="text-sm text-gray-500"></p>
        </section>

        <section class="bg-gradient-to-br from-[#003ec7] to-[#005eff] rounded-[40px] p-8 text-white shadow-2xl">
            <p class="text-xs font-bold opacity-70 uppercase mb-1">Available Balance</p>
            <h3 id="user-balance" class="text-5xl font-black">৳ 0.00</h3>
        </section>

        <div class="grid grid-cols-2 gap-4 text-center">
            <a href="tasks.html" class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 flex flex-col items-center gap-3">
                <span class="material-symbols-outlined text-[#003ec7] text-3xl">bolt</span>
                <span class="font-bold text-sm">Tasks</span>
            </a>
            <a href="wallet.html" class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 flex flex-col items-center gap-3">
                <span class="material-symbols-outlined text-green-600 text-3xl">account_balance_wallet</span>
                <span class="font-bold text-sm">Withdraw</span>
            </a>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border h-20 rounded-[32px] shadow-2xl flex items-center justify-around z-50">
        <a href="dashboard.html" class="text-blue-600"><span class="material-symbols-outlined">home</span></a>
        <a href="tasks.html" class="text-gray-400"><span class="material-symbols-outlined">explore</span></a>
        <a href="wallet.html" class="text-gray-400"><span class="material-symbols-outlined">account_balance_wallet</span></a>
        <a href="profile.html" class="text-gray-400"><span class="material-symbols-outlined">person</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    const name = data.name || "Artisan User";
                    const email = data.email || user.email;

                    document.getElementById('user-name').innerText = name;
                    document.getElementById('user-email').innerText = email;
                    document.getElementById('user-balance').innerText = "৳ " + (data.balance || 0).toFixed(2);
                    
                    // ইমেজ এরর ফিক্স (লাল ক্রস আসবে না)
                    document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=003ec7&color=fff&bold=true`;
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
