<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Work Station | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body class="bg-[#fcf9f8] pb-32">
    
    <header class="p-6 bg-white border-b sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold text-[#003ec7]">Work Station</h1>
        <div id="balance-display" class="bg-blue-50 text-[#003ec7] px-4 py-1 rounded-full font-bold text-sm border border-blue-100">
            ৳ 0.00
        </div>
    </header>

    <main class="p-6 max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6" id="task-container">
        <p class="text-center col-span-full py-10 opacity-50 font-bold">Loading tasks...</p>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-white/20 h-20 rounded-[32px] shadow-2xl flex items-center justify-around z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">home</span><span class="text-[10px] font-bold">Home</span></a>
        <a href="tasks.html" class="flex flex-col items-center text-[#003ec7]"><span class="material-symbols-outlined">explore</span><span class="text-[10px] font-bold">Tasks</span></a>
        <a href="wallet.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">account_balance_wallet</span><span class="text-[10px] font-bold">Wallet</span></a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-bold">Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid + '/balance').on('value', snap => {
                    document.getElementById('balance-display').innerText = "৳ " + (snap.val() || 0).toFixed(2);
                });
                loadTasks();
            } else { window.location.href = "login.html"; }
        });

        function loadTasks() {
            db.ref('tasks').on('value', snap => {
                const tasks = snap.val();
                const container = document.getElementById('task-container');
                if (!tasks) {
                    container.innerHTML = "<p class='col-span-full text-center py-10 font-bold text-gray-400'>No tasks available.</p>";
                    return;
                }

                container.innerHTML = Object.keys(tasks).map(key => {
                    const task = tasks[key];
                    return `
                        <div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-50 flex flex-col justify-between">
                            <div class="flex justify-between items-start mb-6">
                                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-[#003ec7]">
                                    <span class="material-symbols-outlined text-2xl">assignment</span>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] font-bold text-gray-400">REWARD</p>
                                    <p class="text-xl font-black text-green-600">৳${parseFloat(task.reward).toFixed(2)}</p>
                                </div>
                            </div>
                            <h3 class="font-bold text-gray-800 text-lg mb-4 leading-tight">${task.title}</h3>
                            <a href="task-details.html?id=${key}" class="w-full py-4 bg-blue-50 text-[#003ec7] text-center rounded-2xl font-black text-sm hover:bg-[#003ec7] hover:text-white transition-all">Start Task</a>
                        </div>
                    `;
                }).join('');
            });
        }
    </script>
</body>
</html>
