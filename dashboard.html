<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; }
        .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="pb-32 text-[#1c1b1b]">

    <header class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="flex justify-between items-center px-6 py-4 max-w-5xl mx-auto">
            <h1 class="font-headline font-black text-[#003ec7] tracking-tighter text-xl">Prosper</h1>
            <div class="w-8 h-8 rounded-full bg-blue-100 border border-blue-200 overflow-hidden">
                <img id="user-avatar" src="" alt="U">
            </div>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-5xl mx-auto space-y-8">
        <section>
            <p class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-1">Welcome Back,</p>
            <h2 id="welcome-name" class="text-3xl font-black font-headline text-gray-800">Loading...</h2>
        </section>

        <section class="bg-gradient-to-br from-[#003ec7] to-[#005eff] rounded-[40px] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-xs font-bold opacity-70 uppercase tracking-tighter mb-1">Available Balance</p>
                <h3 id="user-balance" class="text-5xl font-black font-headline tracking-tighter">৳ 0.00</h3>
                <div class="mt-10 flex gap-6">
                    <div class="bg-white/10 rounded-2xl px-4 py-3 backdrop-blur-sm">
                        <p class="text-[10px] opacity-60 font-bold uppercase">Tasks Done</p>
                        <p id="tasks-done-count" class="text-lg font-black italic">0</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-2 gap-4">
            <a href="tasks.html" class="bg-white p-6 rounded-3xl border border-gray-50 shadow-sm flex flex-col items-center gap-3">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-[#003ec7]">
                    <span class="material-symbols-outlined">assignment</span>
                </div>
                <span class="font-bold text-sm">Work Station</span>
            </a>
            <a href="wallet.html" class="bg-white p-6 rounded-3xl border border-gray-50 shadow-sm flex flex-col items-center gap-3">
                <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-green-600">
                    <span class="material-symbols-outlined">account_balance_wallet</span>
                </div>
                <span class="font-bold text-sm">Withdraw</span>
            </a>
        </section>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-white/20 h-20 rounded-[32px] shadow-2xl flex items-center justify-around z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-[#003ec7]"><span class="material-symbols-outlined">home</span><span class="text-[10px] font-bold">Home</span></a>
        <a href="tasks.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">explore</span><span class="text-[10px] font-bold">Tasks</span></a>
        <a href="wallet.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">account_balance_wallet</span><span class="text-[10px] font-bold">Wallet</span></a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-bold">Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    const name = data.name || "User";
                    document.getElementById('welcome-name').innerText = name;
                    document.getElementById('user-balance').innerText = "৳ " + (data.balance || 0).toFixed(2);
                    document.getElementById('tasks-done-count').innerText = data.tasksDone || 0;
                    document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=003ec7&color=fff`;
                });
            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
