<script>
const firebaseConfig = {
    apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
    authDomain: "onlineincome-326f9.firebaseapp.com",
    databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
    projectId: "onlineincome-326f9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

auth.onAuthStateChanged(user => {
    if (user) {

        db.ref('users/' + user.uid).on('value', snap => {
            const data = snap.val() || {};

            document.getElementById('user-name').innerText = data.name || "User";
            document.getElementById('user-balance').innerText =
                "৳ " + (data.balance || 0).toFixed(2);
        });

    } else {
        window.location.href = "login.html";
    }
});
</script>
