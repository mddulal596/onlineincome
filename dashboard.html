<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; }
        .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="pb-32 text-[#1c1b1b]">

    <header class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="flex justify-between items-center px-6 py-4 max-w-5xl mx-auto">
            <h1 class="font-headline font-black text-[#003ec7] tracking-tighter text-xl">Prosper</h1>
            <div class="w-8 h-8 rounded-full bg-blue-100 border border-blue-200 overflow-hidden">
                <img id="nav-avatar" src="https://ui-avatars.com/api/?name=User" class="w-full h-full object-cover">
            </div>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-5xl mx-auto space-y-8">
        <section class="bg-gradient-to-br from-[#003ec7] to-[#0052ff] rounded-3xl p-8 text-white shadow-xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-xs uppercase tracking-[0.2em] opacity-80 font-bold mb-1">Welcome Back</p>
                <h2 id="user-name" class="font-headline text-3xl font-extrabold mb-6">Loading...</h2>
                <div class="flex items-end justify-between">
                    <div>
                        <p class="text-[10px] uppercase font-bold opacity-70 tracking-widest">Available Balance</p>
                        <h3 id="user-balance" class="text-4xl font-black tracking-tight mt-1">৳ 0.00</h3>
                    </div>
                    <a href="wallet.html" class="bg-white/20 hover:bg-white/30 backdrop-blur-md px-4 py-2 rounded-xl text-sm font-bold border border-white/10 transition-all">Wallet</a>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm text-center">
                <p class="text-[10px] uppercase font-bold text-gray-400">Referrals</p>
                <p id="ref-count" class="text-xl font-bold text-blue-600">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm text-center">
                <p class="text-[10px] uppercase font-bold text-gray-400">Tasks Done</p>
                <p id="tasks-done" class="text-xl font-bold text-green-600">0</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t flex justify-around py-4 z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-blue-600"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px] font-bold">Studio</span></a>
        <a href="tasks.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">assignment</span><span class="text-[10px] font-bold">Tasks</span></a>
        <a href="wallet.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">account_balance_wallet</span><span class="text-[10px] font-bold">Wallet</span></a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-bold">Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    document.getElementById('user-name').innerText = data.name || "User";
                    document.getElementById('user-balance').innerText = "৳ " + (data.balance || 0).toFixed(2);
                    document.getElementById('ref-count').innerText = data.referrals || 0;
                    document.getElementById('tasks-done').innerText = data.completedTasks || 0;
                });
            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
