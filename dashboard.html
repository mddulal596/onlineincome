<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style> body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; } </style>
</head>
<body class="pb-32">

    <header class="fixed top-0 w-full bg-white border-b px-6 py-4 z-50">
        <h1 class="font-black text-[#003ec7] text-xl">Prosper</h1>
    </header>

    <main class="pt-24 px-6 max-w-5xl mx-auto space-y-6">
        <section class="bg-blue-600 rounded-[32px] p-8 text-white shadow-xl">
            <p class="text-xs font-bold opacity-70 uppercase">Balance</p>
            <h3 id="user-balance" class="text-4xl font-black">৳ 0.00</h3>
            <p id="user-name" class="mt-2 opacity-90 font-bold">Loading User...</p>
        </section>

        <div class="grid grid-cols-2 gap-4">
            <a href="tasks.html" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center gap-2">
                <span class="material-symbols-outlined text-blue-600">bolt</span>
                <span class="font-bold text-sm">Tasks</span>
            </a>
            <a href="wallet.html" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center gap-2">
                <span class="material-symbols-outlined text-green-600">account_balance_wallet</span>
                <span class="font-bold text-sm">Wallet</span>
            </a>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white border border-gray-100 h-20 rounded-[32px] shadow-2xl flex items-center justify-around z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-blue-600">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold">HOME</span>
        </a>
        <a href="tasks.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">explore</span>
            <span class="text-[10px] font-bold">TASKS</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">account_balance_wallet</span>
            <span class="text-[10px] font-bold">WALLET</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px] font-bold">PROFILE</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    document.getElementById('user-name').innerText = data.name || "User";
                    document.getElementById('user-balance').innerText = "৳ " + (data.balance || 0).toFixed(2);
                });
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
