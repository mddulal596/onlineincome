<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style> body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; } </style>
</head>
<body class="pb-32">

    <header class="fixed top-0 w-full bg-white border-b px-6 py-4 z-50 flex justify-between items-center">
        <h1 class="font-black text-[#003ec7] text-xl tracking-tighter">Prosper</h1>
        <div class="w-9 h-9 rounded-full bg-blue-50 border border-blue-100 overflow-hidden shadow-sm">
            <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=003ec7&color=fff" alt="Profile">
        </div>
    </header>

    <main class="pt-24 px-6 max-w-5xl mx-auto space-y-6">
        <section>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-1">Status: Active Artisan</p>
            <h2 id="user-name-display" class="text-3xl font-black text-gray-800 tracking-tight">Loading...</h2>
            <p id="user-email-display" class="text-sm text-gray-500 font-medium opacity-80"></p>
        </section>

        <section class="bg-gradient-to-br from-[#003ec7] to-[#005eff] rounded-[40px] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-xs font-bold opacity-70 uppercase tracking-widest mb-1">Available Balance</p>
                <h3 id="user-balance" class="text-5xl font-black tracking-tighter">৳ 0.00</h3>
            </div>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        </section>

        <div class="grid grid-cols-2 gap-4">
            <a href="tasks.html" class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 flex flex-col items-center gap-3 active:scale-95 transition-transform">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-[#003ec7]">
                    <span class="material-symbols-outlined font-bold">bolt</span>
                </div>
                <span class="font-bold text-sm">Tasks</span>
            </a>
            <a href="wallet.html" class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 flex flex-col items-center gap-3 active:scale-95 transition-transform">
                <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-green-600">
                    <span class="material-symbols-outlined font-bold">account_balance_wallet</span>
                </div>
                <span class="font-bold text-sm">Withdraw</span>
            </a>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-gray-100 h-20 rounded-[32px] shadow-2xl flex items-center justify-around z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-blue-600">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold">HOME</span>
        </a>
        <a href="tasks.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">explore</span>
            <span class="text-[10px] font-bold">TASKS</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">account_balance_wallet</span>
            <span class="text-[10px] font-bold">WALLET</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px] font-bold">PROFILE</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                // ইমেল সরাসরি Auth থেকে দেখাচ্ছি
                document.getElementById('user-email-display').innerText = user.email;

                // ডাটাবেস থেকে নাম এবং ব্যালেন্স লোড করা
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    const name = data.name || "Artisan User";
                    const balance = data.balance || 0;

                    document.getElementById('user-name-display').innerText = name;
                    document.getElementById('user-balance').innerText = "৳ " + balance.toFixed(2);
                    
                    // নাম অনুযায়ী প্রোফাইল পিকচার জেনারেট
                    document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=003ec7&color=fff&bold=true`;
                });
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
