<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32 text-[#1c1b1b]">

    <header class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="flex justify-between items-center px-6 py-4 max-w-5xl mx-auto">
            <h1 class="font-headline font-black text-[#003ec7] tracking-tighter text-xl">Prosper</h1>
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-gray-400">notifications</span>
                <div class="w-8 h-8 rounded-full bg-blue-100 border border-blue-200 overflow-hidden">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=User" alt="User">
                </div>
            </div>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-5xl mx-auto space-y-8">
        
        <section>
            <p class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-1">Welcome Back,</p>
            <h2 id="user-name" class="text-3xl font-black font-headline text-gray-800">Loading...</h2>
        </section>

        <section class="bg-gradient-to-br from-[#003ec7] to-[#005eff] rounded-[40px] p-8 text-white shadow-2xl shadow-blue-200 relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs font-bold opacity-70 uppercase tracking-tighter mb-1">Available Balance</p>
                        <h3 id="user-balance" class="text-5xl font-black font-headline">৳ 0.00</h3>
                    </div>
                    <a href="wallet.html" class="bg-white/20 backdrop-blur-md p-3 rounded-2xl hover:bg-white/30 transition-all">
                        <span class="material-symbols-outlined">add</span>
                    </a>
                </div>
                
                <div class="mt-10 flex gap-6">
                    <div class="bg-white/10 rounded-2xl px-4 py-3 backdrop-blur-sm">
                        <p class="text-[10px] opacity-60 font-bold uppercase">Tasks Completed</p>
                        <p id="tasks-done-count" class="text-lg font-black italic">0</p>
                    </div>
                    <div class="bg-white/10 rounded-2xl px-4 py-3 backdrop-blur-sm">
                        <p class="text-[10px] opacity-60 font-bold uppercase">Membership</p>
                        <p class="text-lg font-black italic">Artisan</p>
                    </div>
                </div>
            </div>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        </section>

        <section class="grid grid-cols-2 gap-4">
            <a href="tasks.html" class="bg-white p-6 rounded-3xl border border-gray-50 shadow-sm flex flex-col items-center text-center gap-3 hover:border-blue-100 transition-all group">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-[#003ec7] group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined">assignment</span>
                </div>
                <span class="font-bold text-sm">Work Station</span>
            </a>
            <a href="wallet.html" class="bg-white p-6 rounded-3xl border border-gray-50 shadow-sm flex flex-col items-center text-center gap-3 hover:border-blue-100 transition-all group">
                <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-green-600 group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined">account_balance_wallet</span>
                </div>
                <span class="font-bold text-sm">Withdraw</span>
            </a>
        </section>

    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-white/20 h-20 rounded-[32px] shadow-2xl flex items-center justify-around px-4 z-50">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-[#003ec7]">
            <span class="material-symbols-outlined font-variation-fill text-2xl">home</span>
            <span class="text-[10px] font-bold uppercase">Home</span>
        </a>
        <a href="tasks.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="material-symbols-outlined text-2xl">explore</span>
            <span class="text-[10px] font-bold uppercase">Tasks</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="material-symbols-outlined text-2xl">account_balance_wallet</span>
            <span class="text-[10px] font-bold uppercase">Wallet</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="material-symbols-outlined text-2xl">person</span>
            <span class="text-[10px] font-bold uppercase">Profile</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                const userRef = db.ref('users/' + user.uid);
                
                // রিয়েলটাইম ডাটা লিসেনিং
                userRef.on('value', snap => {
                    const data = snap.val() || {};
                    
                    // নাম আপডেট
                    const fullName = data.name || "Valued User";
                    document.getElementById('user-name').innerText = fullName;
                    
                    // ব্যালেন্স আপডেট
                    const balance = data.balance || 0;
                    document.getElementById('user-balance').innerText = "৳ " + balance.toFixed(2);
                    
                    // টাস্ক কাউন্ট আপডেট
                    const tasksDone = data.tasksDone || 0;
                    document.getElementById('tasks-done-count').innerText = tasksDone;

                    // প্রোফাইল পিকচার (UI Avatars ব্যবহার করে)
                    document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=003ec7&color=fff`;
                });

            } else {
                // লগইন না থাকলে লগইন পেজে পাঠিয়ে দেবে
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
