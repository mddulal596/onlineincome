<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-6">

<h2 id="name"></h2>
<h1 id="balance">৳0</h1>

<button onclick="withdraw()">Withdraw</button>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
authDomain: "onlineincome-326f9.firebaseapp.com",
databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
projectId: "onlineincome-326f9"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

auth.onAuthStateChanged(user=>{
if(user){
db.ref('users/'+user.uid).on('value',snap=>{
let d=snap.val()||{};
name.innerText=d.name||"User";
balance.innerText="৳"+(d.balance||0);
});
}else{
location="login.html";
}
});

function withdraw(){
let user=auth.currentUser;

db.ref('withdrawRequests/'+user.uid).push({
amount:100,
number:"01XXXXXXXX",
status:"pending",
time:Date.now()
});

alert("Requested");
}
</script>

</body>
</html>
