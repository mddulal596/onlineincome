<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Wallet | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; padding-bottom: 120px; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-gray-100 px-6 py-4">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <h1 class="font-black text-[#003ec7] text-xl tracking-tighter">My Wallet</h1>
            <span class="material-symbols-outlined text-gray-400">history</span>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-xl mx-auto space-y-6">
        <div class="bg-gradient-to-br from-[#003ec7] to-[#005eff] rounded-[40px] p-8 text-white shadow-2xl relative overflow-hidden">
            <p class="text-xs font-bold opacity-70 uppercase tracking-widest mb-1">Total Earnings</p>
            <h2 id="user-balance" class="text-5xl font-black tracking-tighter">৳ 0.00</h2>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        </div>

        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-50 space-y-5">
            <h3 class="font-bold text-gray-800 text-lg">Withdraw Funds</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Payment Method</label>
                    <select id="method" class="w-full mt-1 p-4 bg-gray-50 border-none rounded-2xl font-bold text-gray-700 focus:ring-2 focus:ring-blue-600/20">
                        <option value="bKash">bKash</option>
                        <option value="Nagad">Nagad</option>
                        <option value="Rocket">Rocket</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Account Number</label>
                    <input type="number" id="account-number" placeholder="017XXXXXXXX" class="w-full mt-1 p-4 bg-gray-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-blue-600/20">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Amount (Min: ৳50)</label>
                    <input type="number" id="amount" placeholder="50.00" class="w-full mt-1 p-4 bg-gray-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-blue-600/20">
                </div>

                <button onclick="requestWithdraw()" class="w-full py-4 bg-[#003ec7] text-white rounded-2xl font-black shadow-lg hover:opacity-90 active:scale-95 transition-all">
                    Submit Request
                </button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white border border-gray-100 h-20 rounded-[32px] shadow-2xl flex items-center justify-around z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold">HOME</span>
        </a>
        <a href="tasks.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">explore</span>
            <span class="text-[10px] font-bold">TASKS</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center text-[#003ec7]">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">account_balance_wallet</span>
            <span class="text-[10px] font-bold">WALLET</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px] font-bold">PROFILE</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentBalance = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    currentBalance = data.balance || 0;
                    document.getElementById('user-balance').innerText = "৳ " + currentBalance.toFixed(2);
                });
            } else {
                window.location.href = "login.html";
            }
        });

        async function requestWithdraw() {
            const method = document.getElementById('method').value;
            const account = document.getElementById('account-number').value;
            const amount = parseFloat(document.getElementById('amount').value);

            if (!account || account.length < 11) {
                return Swal.fire('Error', 'সঠিক একাউন্ট নাম্বার দিন', 'error');
            }
            if (isNaN(amount) || amount < 50) {
                return Swal.fire('Error', 'সর্বনিম্ন ৫০ টাকা উইথড্র করতে পারবেন', 'error');
            }
            if (amount > currentBalance) {
                return Swal.fire('Error', 'আপনার পর্যাপ্ত ব্যালেন্স নেই', 'error');
            }

            const user = auth.currentUser;
            const newWithdrawRef = db.ref('withdrawals').push();
            
            try {
                // উইথড্রাল রিকোয়েস্ট সেভ করা
                await newWithdrawRef.set({
                    uid: user.uid,
                    method: method,
                    account: account,
                    amount: amount,
                    status: 'pending',
                    timestamp: Date.now()
                });

                // ব্যালেন্স থেকে টাকা কেটে নেওয়া
                await db.ref('users/' + user.uid).update({
                    balance: currentBalance - amount
                });

                Swal.fire({
                    title: 'Success!',
                    text: 'আপনার রিকোয়েস্ট পেন্ডিং আছে। ১-১২ ঘন্টার মধ্যে পেমেন্ট পাবেন।',
                    icon: 'success',
                    confirmButtonColor: '#003ec7'
                });

                document.getElementById('account-number').value = "";
                document.getElementById('amount').value = "";
            } catch (error) {
                Swal.fire('Error', 'কিছু সমস্যা হয়েছে, আবার চেষ্টা করুন', 'error');
            }
        }
    </script>
</body>
</html>
