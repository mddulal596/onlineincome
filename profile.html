<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; }
        .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-[#fcf9f8] pb-32">

    <header class="p-6 bg-white border-b flex items-center justify-between sticky top-0 z-50">
        <h1 class="text-xl font-bold text-[#003ec7]">My Profile</h1>
        <button onclick="confirmLogout()" class="text-red-500 font-bold flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">logout</span> Logout
        </button>
    </header>

    <main class="p-8 max-w-xl mx-auto text-center">
        <div class="w-32 h-32 rounded-3xl mx-auto mb-6 shadow-xl border-4 border-white overflow-hidden bg-blue-50">
            <img id="user-img" src="https://ui-avatars.com/api/?name=User&background=003ec7&color=fff" class="w-full h-full object-cover">
        </div>

        <h2 id="user-name" class="text-3xl font-black font-headline mb-1 text-gray-800">Loading...</h2>
        <p id="user-email" class="text-gray-500 mb-8 font-medium italic">...</p>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100">
                <p class="text-[10px] uppercase font-bold text-gray-400 tracking-widest mb-1">Total Balance</p>
                <h4 id="user-balance" class="text-xl font-black text-green-600">৳ 0.00</h4>
            </div>
            <div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100">
                <p class="text-[10px] uppercase font-bold text-gray-400 tracking-widest mb-1">Tasks Done</p>
                <h4 id="user-tasks-done" class="text-xl font-black text-[#003ec7]">0</h4>
            </div>
        </div>

        <div class="space-y-3">
            <a href="wallet.html" class="w-full flex items-center justify-between p-5 bg-white rounded-2xl border border-gray-50 shadow-sm hover:border-blue-100 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-green-50 text-green-600 rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined">payments</span>
                    </div>
                    <span class="font-bold text-gray-700">Withdraw History</span>
                </div>
                <span class="material-symbols-outlined text-gray-300">chevron_right</span>
            </a>
            
            <button onclick="Swal.fire('Support', 'আমাদের টেলিগ্রাম চ্যানেলে যোগাযোগ করুন।', 'info')" class="w-full flex items-center justify-between p-5 bg-white rounded-2xl border border-gray-50 shadow-sm hover:border-blue-100 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-50 text-[#003ec7] rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined">headset_mic</span>
                    </div>
                    <span class="font-bold text-gray-700">Customer Support</span>
                </div>
                <span class="material-symbols-outlined text-gray-300">chevron_right</span>
            </button>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-white/20 h-20 rounded-[32px] shadow-2xl flex items-center justify-around px-4 z-50">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold uppercase">Home</span>
        </a>
        <a href="tasks.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="material-symbols-outlined">explore</span>
            <span class="text-[10px] font-bold uppercase">Tasks</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="material-symbols-outlined">account_balance_wallet</span>
            <span class="text-[10px] font-bold uppercase">Wallet</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-[#003ec7]">
            <span class="material-symbols-outlined font-variation-fill">person</span>
            <span class="text-[10px] font-bold uppercase">Profile</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                // ডাটাবেস থেকে ইউজারের ডাটা রিয়েলটাইম রিড করা
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    const name = data.name || "User";
                    
                    document.getElementById('user-name').innerText = name;
                    document.getElementById('user-email').innerText = user.email;
                    document.getElementById('user-balance').innerText = "৳ " + (data.balance || 0).toFixed(2);
                    document.getElementById('user-tasks-done').innerText = data.tasksDone || 0;
                    
                    // নাম অনুযায়ী অটোমেটিক প্রোফাইল ছবি
                    document.getElementById('user-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=003ec7&color=fff&bold=true`;
                });
            } else {
                window.location.href = "login.html";
            }
        });

        function confirmLogout() {
            Swal.fire({
                title: 'Logout?',
                text: "আপনি কি নিশ্চিতভাবে লগআউট করতে চান?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Yes, Logout!',
                cancelButtonText: 'Cancel'
            }).then((result) => {
                if (result.isConfirmed) {
                    auth.signOut().then(() => {
                        window.location.href = "login.html";
                    });
                }
            });
        }
    </script>
</body>
</html>
