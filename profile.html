<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style> body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; } </style>
</head>
<body class="pb-32">

    <main class="max-w-xl mx-auto px-6 pt-12 space-y-8">
        <div class="text-center space-y-4">
            <div class="w-28 h-28 bg-blue-100 rounded-full mx-auto border-4 border-white shadow-xl overflow-hidden">
                <img id="p-avatar" src="https://ui-avatars.com/api/?name=User" class="w-full h-full object-cover">
            </div>
            <div>
                <h2 id="p-name" class="text-3xl font-black text-gray-800">Loading...</h2>
                <p id="p-email" class="text-gray-500 font-medium"></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Total Tasks</p>
                <h4 id="p-tasks" class="text-2xl font-black text-blue-600">0</h4>
            </div>
            <div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Account</p>
                <h4 class="text-2xl font-black text-green-600">Verified</h4>
            </div>
        </div>

        <div class="bg-white rounded-[32px] border border-gray-100 overflow-hidden shadow-sm">
            <div class="p-4 border-b border-gray-50 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-gray-400">notifications</span>
                    <span class="font-bold text-sm text-gray-700">Notifications</span>
                </div>
                <span class="text-xs font-bold text-blue-600">ON</span>
            </div>
            <button onclick="logoutUser()" class="w-full p-6 flex items-center gap-3 text-red-500 hover:bg-red-50 transition-colors">
                <span class="material-symbols-outlined">logout</span>
                <span class="font-bold">Logout from Atelier</span>
            </button>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-gray-100 h-20 rounded-[32px] shadow-2xl flex items-center justify-around z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold">HOME</span>
        </a>
        <a href="tasks.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">explore</span>
            <span class="text-[10px] font-bold">TASKS</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">account_balance_wallet</span>
            <span class="text-[10px] font-bold">WALLET</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-blue-600">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px] font-bold">PROFILE</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('p-email').innerText = user.email;

                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    const name = data.name || "Artisan User";
                    document.getElementById('p-name').innerText = name;
                    document.getElementById('p-tasks').innerText = data.tasksDone || 0;
                    document.getElementById('p-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=003ec7&color=fff&bold=true`;
                });
            } else {
                window.location.href = "login.html";
            }
        });

        function logoutUser() {
            auth.signOut().then(() => {
                window.location.href = "login.html";
            });
        }
    </script>
</body>
</html>
