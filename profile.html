<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
</head>
<body class="bg-[#fcf9f8] pb-32">
    <main class="p-8 max-w-xl mx-auto text-center">
        <div class="w-32 h-32 rounded-3xl mx-auto mb-6 shadow-xl border-4 border-white overflow-hidden">
            <img id="user-img" src="https://ui-avatars.com/api/?name=User" class="w-full h-full object-cover">
        </div>
        <h2 id="user-name" class="text-3xl font-black mb-1">Loading...</h2>
        <p id="user-email" class="text-gray-500 mb-8 font-medium">...</p>

        <button onclick="logout()" class="w-full py-4 bg-red-50 text-red-600 rounded-2xl font-bold hover:bg-red-100 transition-all">Sign Out</button>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t flex justify-around py-4 z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px] font-bold">Studio</span></a>
        <a href="tasks.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">assignment</span><span class="text-[10px] font-bold">Tasks</span></a>
        <a href="wallet.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">account_balance_wallet</span><span class="text-[10px] font-bold">Wallet</span></a>
        <a href="profile.html" class="flex flex-col items-center text-blue-600"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-bold">Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    document.getElementById('user-name').innerText = data.name || "User";
                    document.getElementById('user-email').innerText = user.email;
                    document.getElementById('user-img').src = user.photoURL || `https://ui-avatars.com/api/?name=${data.name || 'User'}`;
                });
            } else { window.location.href = "login.html"; }
        });

        function logout() { auth.signOut().then(() => window.location.href = "login.html"); }
    </script>
</body>
</html>
