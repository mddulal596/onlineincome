<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style> body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; } </style>
</head>
<body class="p-8">
    <main class="max-w-md mx-auto text-center space-y-8 mt-12">
        <div>
            <img id="profile-img" class="w-24 h-24 rounded-full mx-auto border-4 border-white shadow-xl" src="" alt="Profile">
            <h2 id="profile-name" class="text-2xl font-black mt-4">Loading...</h2>
            <p id="profile-email" class="text-gray-500 text-sm"></p>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border space-y-4">
            <div class="flex justify-between border-b pb-2">
                <span class="text-gray-400">Account Status</span>
                <span class="text-green-600 font-bold">Active</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-400">Tasks Completed</span>
                <span id="profile-tasks" class="font-bold text-blue-600">0</span>
            </div>
        </div>

        <button onclick="logout()" class="w-full py-4 bg-red-50 text-red-600 font-bold rounded-2xl">Logout</button>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                firebase.database().ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    const name = data.name || "Artisan User";
                    document.getElementById('profile-name').innerText = name;
                    document.getElementById('profile-email').innerText = user.email;
                    document.getElementById('profile-tasks').innerText = data.tasksDone || 0;
                    document.getElementById('profile-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=003ec7&color=fff&bold=true`;
                });
            } else { window.location.href = "index.html"; }
        });

        function logout() {
            firebase.auth().signOut().then(() => {
                window.location.href = "index.html";
            });
        }
    </script>
</body>
</html>
