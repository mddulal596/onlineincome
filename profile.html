<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style> body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; } </style>
</head>
<body class="pb-32">

    <header class="p-6 bg-white border-b flex items-center justify-between sticky top-0 z-50">
        <h1 class="text-xl font-black text-[#003ec7]">My Profile</h1>
        <button onclick="confirmLogout()" class="text-red-500 font-bold flex items-center gap-1 bg-red-50 px-4 py-2 rounded-xl">
            <span class="material-symbols-outlined text-sm">logout</span> Logout
        </button>
    </header>

    <main class="p-8 max-w-xl mx-auto text-center">
        <div class="w-32 h-32 rounded-[32px] mx-auto mb-6 shadow-xl border-4 border-white overflow-hidden bg-blue-50">
            <img id="user-img" src="" class="w-full h-full object-cover">
        </div>
        <h2 id="user-name" class="text-3xl font-black mb-1">Loading...</h2>
        <p id="user-email" class="text-gray-400 text-sm font-medium mb-8"></p>

        <div class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-100 space-y-6 text-left">
            <div class="flex justify-between items-center border-b pb-4">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Balance</p>
                    <p id="user-balance" class="text-xl font-black text-[#003ec7]">৳ 0.00</p>
                </div>
                <span class="material-symbols-outlined text-blue-200">account_balance_wallet</span>
            </div>
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Tasks Completed</p>
                    <p id="user-tasks" class="text-xl font-black text-green-600">0</p>
                </div>
                <span class="material-symbols-outlined text-green-200">task_alt</span>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-white/20 h-20 rounded-[32px] shadow-2xl flex items-center justify-around z-50">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-black">HOME</span>
        </a>
        <a href="tasks.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="material-symbols-outlined">explore</span>
            <span class="text-[10px] font-bold">TASKS</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="material-symbols-outlined">account_balance_wallet</span>
            <span class="text-[10px] font-bold">WALLET</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-blue-600">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">person</span>
            <span class="text-[10px] font-black">PROFILE</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    const name = data.name || "Artisan User";
                    const email = data.email || user.email;

                    document.getElementById('user-name').innerText = name;
                    document.getElementById('user-email').innerText = email;
                    document.getElementById('user-balance').innerText = "৳ " + (data.balance || 0).toFixed(2);
                    document.getElementById('user-tasks').innerText = data.tasksDone || 0;
                    document.getElementById('user-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=003ec7&color=fff&bold=true`;
                });
            } else { window.location.href = "login.html"; }
        });

        function confirmLogout() {
            Swal.fire({
                title: 'Logout?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#003ec7',
                confirmButtonText: 'Yes, Logout!'
            }).then((result) => {
                if (result.isConfirmed) { auth.signOut().then(() => { window.location.href = "login.html"; }); }
            });
        }
    </script>
</body>
</html>
