<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body class="bg-[#fcf9f8] pb-32">
    <header class="p-6 bg-white border-b flex items-center justify-between sticky top-0 z-50">
        <h1 class="text-xl font-bold text-[#003ec7]">My Profile</h1>
        <button onclick="confirmLogout()" class="text-red-500 font-bold flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">logout</span> Logout
        </button>
    </header>

    <main class="p-8 max-w-xl mx-auto text-center">
        <div class="w-32 h-32 rounded-[32px] mx-auto mb-6 shadow-xl border-4 border-white overflow-hidden bg-blue-50">
            <img id="user-img" src="" class="w-full h-full object-cover">
        </div>
        <h2 id="user-name" class="text-3xl font-black mb-1 text-gray-800">Loading...</h2>
        <p id="user-email" class="text-gray-500 mb-8 font-medium">...</p>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-[10px] uppercase font-bold text-gray-400 mb-1">Total Balance</p>
                <h4 id="user-balance" class="text-xl font-black text-green-600">৳ 0.00</h4>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-[10px] uppercase font-bold text-gray-400 mb-1">Tasks Done</p>
                <h4 id="user-tasks" class="text-xl font-black text-[#003ec7]">0</h4>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-white/20 h-20 rounded-[32px] shadow-2xl flex items-center justify-around z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">home</span><span class="text-[10px] font-bold">Home</span></a>
        <a href="tasks.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">explore</span><span class="text-[10px] font-bold">Tasks</span></a>
        <a href="wallet.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">account_balance_wallet</span><span class="text-[10px] font-bold">Wallet</span></a>
        <a href="profile.html" class="flex flex-col items-center text-[#003ec7]"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-bold">Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    const name = data.name || "User";
                    document.getElementById('user-name').innerText = name;
                    document.getElementById('user-email').innerText = user.email;
                    document.getElementById('user-balance').innerText = "৳ " + (data.balance || 0).toFixed(2);
                    document.getElementById('user-tasks').innerText = data.tasksDone || 0;
                    document.getElementById('user-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=003ec7&color=fff&bold=true`;
                });
            } else { window.location.href = "login.html"; }
        });

        function confirmLogout() {
            Swal.fire({
                title: 'Logout?',
                text: "Are you sure you want to log out?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Yes, Logout!'
            }).then((result) => {
                if (result.isConfirmed) {
                    auth.signOut().then(() => { window.location.href = "login.html"; });
                }
            });
        }
    </script>
</body>
</html>
