<!-- Firebase SDKs -->
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // UI Elements
        const taskListContainer = document.getElementById('task-list');

        // Check Auth State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("User logged in:", user.uid);
                fetchTasks();
            } else {
                console.log("No user logged in. Redirecting...");
                // In a real app: window.location.href = 'login.html';
            }
        });

        // Fetch Tasks from Firestore
        function fetchTasks() {
            const tasksCol = collection(db, 'tasks');
            const q = query(tasksCol, orderBy('reward', 'desc'));

            onSnapshot(q, (snapshot) => {
                const tasks = [];
                snapshot.forEach((doc) => {
                    tasks.push({ id: doc.id, ...doc.data() });
                });
                renderTasks(tasks);
            }, (error) => {
                console.error("Error fetching tasks:", error);
                // Fallback rendering for demo purposes if Firestore is empty/blocked
                renderTasks([
                    { title: "Install Mobile Wallet", reward: "25.00", time: "5 min", difficulty: "Easy", status: "New" },
                    { title: "Watch Ad Campaign", reward: "5.50", time: "1 min", difficulty: "Easy", status: "Started" },
                    { title: "Review Product UX", reward: "120.00", time: "15 min", difficulty: "Medium", status: "New" }
                ]);
            });
        }

        function renderTasks(tasks) {
            if (tasks.length === 0) {
                taskListContainer.innerHTML = `<div class="col-span-full py-12 text-center text-on-surface-variant italic">No tasks available yet.</div>`;
                return;
            }

            taskListContainer.innerHTML = tasks.map(task => {
                const statusColor = task.status === 'Completed' ? 'bg-secondary/10 text-secondary' : 
                                  task.status === 'Started' ? 'bg-primary/10 text-primary' : 
                                  'bg-on-surface/5 text-on-surface-variant';
                
                return `
                <div class="group bg-surface-container-lowest p-6 rounded-2xl shadow-[0px_10px_32px_rgba(28,27,27,0.02)] border border-transparent hover:border-primary/10 transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest ${statusColor}">
                            ${task.status}
                        </span>
                        <div class="text-right">
                            <span class="block text-[10px] uppercase font-bold tracking-tighter text-on-surface-variant">Reward</span>
                            <span class="text-xl font-headline font-extrabold text-secondary">৳${task.reward}</span>
                        </div>
                    </div>
                    
                    <h4 class="font-headline text-lg font-bold leading-tight mb-4 group-hover:text-primary transition-colors">${task.title}</h4>
                    
                    <div class="flex items-center gap-4 pt-4 border-t border-surface-container-low">
                        <div class="flex items-center gap-1.5 text-xs text-on-surface-variant font-medium">
                            <span class="material-symbols-outlined text-sm">schedule</span>
                            ${task.time}
                        </div>
                        <div class="flex items-center gap-1.5 text-xs text-on-surface-variant font-medium">
                            <span class="material-symbols-outlined text-sm">leaderboard</span>
                            ${task.difficulty}
                        </div>
                    </div>

                    <button class="w-full mt-6 py-3 rounded-xl bg-surface-container-low text-on-surface font-semibold text-sm hover:bg-primary hover:text-on-primary transition-all active:scale-95">
                        Start Task
                    </button>
                </div>
                `;
            }).join('');
        }
    </script>
