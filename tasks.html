<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Tasks | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
</head>
<body class="bg-[#fcf9f8] pb-32">
    
    <header class="p-6 bg-white border-b sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold text-[#003ec7]">Work Station</h1>
        <div id="balance-display" class="bg-blue-50 text-[#003ec7] px-4 py-1 rounded-full font-bold text-sm border border-blue-100">
            ৳ 0.00
        </div>
    </header>

    <main class="p-6 max-w-5xl mx-auto">
        <div class="flex gap-3 overflow-x-auto no-scrollbar mb-8 pb-2">
            <button class="bg-[#003ec7] text-white px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap">All Tasks</button>
            <button class="bg-white text-gray-500 px-6 py-2 rounded-full text-xs font-bold border border-gray-100 whitespace-nowrap">High Paying</button>
        </div>

        <div id="task-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <p class="text-center col-span-full text-gray-400 py-10">Loading tasks...</p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t flex justify-around py-4 z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px] font-bold">Studio</span></a>
        <a href="tasks.html" class="flex flex-col items-center text-blue-600"><span class="material-symbols-outlined">assignment</span><span class="text-[10px] font-bold">Tasks</span></a>
        <a href="wallet.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">account_balance_wallet</span><span class="text-[10px] font-bold">Wallet</span></a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-bold">Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // আইকন সেট করার লজিক
        function getIcon(type) {
            if(type === 'facebook') return 'facebook';
            if(type === 'youtube') return 'play_circle';
            if(type === 'tiktok') return 'music_note';
            return 'language';
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                // ইউজারের বর্তমান ব্যালেন্স দেখানো
                db.ref('users/' + user.uid + '/balance').on('value', snap => {
                    document.getElementById('balance-display').innerText = "৳ " + (snap.val() || 0).toFixed(2);
                });

                // টাস্ক লিস্ট লোড করা
                loadAllTasks();
            } else {
                window.location.href = "login.html";
            }
        });

        function loadAllTasks() {
            db.ref('tasks').on('value', snap => {
                const tasks = snap.val();
                const container = document.getElementById('task-container');
                
                if (!tasks) {
                    container.innerHTML = "<p class='text-center col-span-full text-gray-400'>No tasks available yet.</p>";
                    return;
                }

                container.innerHTML = Object.keys(tasks).map(key => {
                    const task = tasks[key];
                    return `
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-50 flex flex-col justify-between">
                            <div class="flex justify-between items-start mb-4">
                                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                                    <span class="material-symbols-outlined">${getIcon(task.type)}</span>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] uppercase font-bold text-gray-400">Reward</p>
                                    <p class="text-lg font-black text-green-600">৳${parseFloat(task.reward).toFixed(2)}</p>
                                </div>
                            </div>
                            <h3 class="font-bold text-gray-800">${task.title}</h3>
                            <p class="text-[10px] text-gray-400 mb-4 flex items-center gap-1">
                                <span class="material-symbols-outlined text-[12px]">schedule</span> ${task.time}
                            </p>
                            <a href="task-details.html?id=${key}" class="w-full py-3 bg-blue-50 text-[#003ec7] text-center rounded-2xl font-bold text-xs hover:bg-[#003ec7] hover:text-white transition-all">
                                Open Task
                            </a>
                        </div>
                    `;
                }).join('');
            });
        }
    </script>
</body>
</html>
