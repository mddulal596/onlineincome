<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Prosper - Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcf9f8; }
        .editorial-gradient { background: linear-gradient(135deg, #003ec7 0%, #0052ff 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 bg-white rounded-[2rem] shadow-xl overflow-hidden border border-gray-100">
        <section class="hidden lg:flex lg:col-span-7 editorial-gradient p-16 text-white flex-col justify-between">
            <div>
                <h1 class="text-6xl font-black leading-tight mb-6">Wealth with <br/><span class="text-green-300">Precision.</span></h1>
                <p class="text-xl opacity-80">The atelier of modern digital artisans.</p>
            </div>
        </section>
        <section class="col-span-1 lg:col-span-5 p-12">
            <div id="login-view">
                <h2 class="text-4xl font-black mb-8 tracking-tight">Welcome</h2>
                <form id="login-form" class="space-y-4">
                    <input id="login-email" class="w-full p-4 bg-gray-50 rounded-xl outline-none" placeholder="Email" type="email" required>
                    <input id="login-password" class="w-full p-4 bg-gray-50 rounded-xl outline-none" placeholder="Password" type="password" required>
                    <button class="w-full editorial-gradient text-white font-bold py-4 rounded-xl shadow-lg">Sign In</button>
                </form>
                <p class="mt-8 text-sm text-center">New here? <button onclick="toggleAuth('signup')" class="text-blue-600 font-bold">Create Account</button></p>
            </div>
            <div id="signup-view" class="hidden">
                <h2 class="text-4xl font-black mb-8 tracking-tight">Join Us</h2>
                <form id="signup-form" class="space-y-4">
                    <input id="signup-name" class="w-full p-4 bg-gray-50 rounded-xl outline-none" placeholder="Full Name" type="text" required>
                    <input id="signup-email" class="w-full p-4 bg-gray-50 rounded-xl outline-none" placeholder="Email" type="email" required>
                    <input id="signup-password" class="w-full p-4 bg-gray-50 rounded-xl outline-none" placeholder="Password" type="password" required>
                    <button class="w-full editorial-gradient text-white font-bold py-4 rounded-xl shadow-lg">Join Now</button>
                </form>
                <p class="mt-8 text-sm text-center">Have account? <button onclick="toggleAuth('login')" class="text-blue-600 font-bold">Sign In</button></p>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        window.toggleAuth = (view) => {
            document.getElementById('login-view').classList.toggle('hidden', view === 'signup');
            document.getElementById('signup-view').classList.toggle('hidden', view === 'login');
        };

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            try {
                const res = await auth.createUserWithEmailAndPassword(email, password);
                await db.ref('users/' + res.user.uid).set({
                    name: name,
                    email: email,
                    balance: 0,
                    tasksDone: 0,
                    createdAt: Date.now()
                });
                window.location.href = 'dashboard.html';
            } catch (err) { alert(err.message); }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-password').value);
                window.location.href = 'dashboard.html';
            } catch (err) { alert("Login failed!"); }
        });
    </script>
</body>
</html>
