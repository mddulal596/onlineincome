<script>
const firebaseConfig = {
    apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
    authDomain: "onlineincome-326f9.firebaseapp.com",
    databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
    projectId: "onlineincome-326f9",
    storageBucket: "onlineincome-326f9.firebasestorage.app",
    messagingSenderId: "79088960253",
    appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

auth.onAuthStateChanged(user => {
    if (user) {

        // ✅ USER AUTO CREATE
        db.ref('users/' + user.uid).once('value').then(snap => {
            if (!snap.exists()) {
                db.ref('users/' + user.uid).set({
                    name: "User",
                    balance: 0,
                    createdAt: Date.now()
                });
            }
        });

        // ✅ USER NAME LOAD
        db.ref('users/' + user.uid + '/name').once('value', snap => {
            document.getElementById('user-display-name').innerText = snap.val() || "User";
        });

        // ✅ DAILY BONUS AUTO (10৳)
        giveDailyBonus(user.uid);

        // ✅ TASK LOAD
        loadFeaturedTasks();

    } else {
        window.location.href = "login.html";
    }
});

function loadFeaturedTasks() {
    db.ref('tasks').limitToFirst(3).on('value', snap => {
        const tasks = snap.val();
        const container = document.getElementById('featured-tasks-container');

        if (!tasks) {
            container.innerHTML = "<p class='text-center text-gray-400'>No tasks available.</p>";
            return;
        }

        container.innerHTML = Object.keys(tasks).map(key => {
            const task = tasks[key];

            return `
            <div onclick="completeTask('${key}', ${task.reward})"
            class="block bg-white p-6 rounded-3xl shadow-sm border border-gray-50 hover:border-blue-100 hover:shadow-md transition-all group cursor-pointer">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-[#003ec7]">
                            <span class="material-symbols-outlined text-2xl">assignment</span>
                        </div>
                        <div>
                            <span class="text-[9px] font-black text-blue-600 uppercase">${task.type}</span>
                            <h4 class="font-bold text-gray-800 text-base">${task.title}</h4>
                            <p class="text-xs text-gray-400">Earn ৳${parseFloat(task.reward).toFixed(2)}</p>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    });
}

function completeTask(taskId, reward) {
    const user = auth.currentUser;

    db.ref('completedTasks/' + user.uid + '/' + taskId).once('value').then(snap => {
        if (snap.exists()) {
            alert("Already completed");
            return;
        }

        // mark complete
        db.ref('completedTasks/' + user.uid + '/' + taskId).set(true);

        // add balance
        db.ref('users/' + user.uid + '/balance').transaction(b => (b || 0) + reward);

        alert("Reward Added!");
    });
}

// ✅ DAILY BONUS FUNCTION
function giveDailyBonus(uid) {
    const today = new Date().toDateString();

    db.ref('dailyBonus/' + uid).once('value').then(snap => {
        if (snap.val() === today) return;

        db.ref('dailyBonus/' + uid).set(today);

        db.ref('users/' + uid + '/balance').transaction(b => (b || 0) + 10);

        console.log("Daily bonus added");
    });
}
</script>
