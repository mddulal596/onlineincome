<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-6">

<h2 id="user"></h2>

<div id="tasks"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
authDomain: "onlineincome-326f9.firebaseapp.com",
databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
projectId: "onlineincome-326f9"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

auth.onAuthStateChanged(user=>{
if(user){
db.ref('users/'+user.uid+'/name').once('value').then(snap=>{
user.innerText=snap.val()||"User";
});

loadTasks();
}else{
location="login.html";
}
});

function loadTasks(){
db.ref('tasks').on('value',snap=>{
let html="";
let data=snap.val();

for(let id in data){
let t=data[id];

html+=`
<div class="bg-white p-4 mb-2">
<h3>${t.title}</h3>
<p>৳${t.reward}</p>
<button onclick="complete('${id}',${t.reward})">Complete</button>
</div>`;
}
tasks.innerHTML=html;
});
}

function complete(id,reward){
let user=auth.currentUser;

db.ref('completedTasks/'+user.uid+'/'+id).once('value').then(s=>{
if(s.exists()){
alert("Already done");
return;
}

db.ref('completedTasks/'+user.uid+'/'+id).set(true);

db.ref('users/'+user.uid+'/balance').transaction(b=>(b||0)+reward);

alert("Earned!");
});
}
</script>

</body>
</html>
