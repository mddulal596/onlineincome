<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Access | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto space-y-8">
        
        <div id="login-section" class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100 text-center space-y-6">
            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 mx-auto">
                <span class="material-symbols-outlined text-3xl">lock</span>
            </div>
            <div>
                <h2 class="text-2xl font-black text-slate-800">Admin Login</h2>
                <p class="text-sm text-slate-500 mt-1">প্যানেলে প্রবেশ করতে পাসওয়ার্ড দিন</p>
            </div>
            <input id="admin-pass" type="password" placeholder="Enter Password" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-center text-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">Login Now</button>
        </div>

        <div id="admin-content" class="hidden space-y-8">
            
            <div class="flex items-center justify-between bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Admin Dashboard</h1>
                    <p class="text-sm text-slate-500">Welcome back, Dulal!</p>
                </div>
                <button onclick="location.reload()" class="p-3 bg-red-50 text-red-500 rounded-xl hover:bg-red-100">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 space-y-5">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-600">add_task</span> নতুন টাস্ক যোগ করুন
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="t-title" type="text" placeholder="Task Title" class="bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500">
                    <input id="t-reward" type="number" step="0.01" placeholder="Reward (৳)" class="bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500">
                </div>

                <input id="t-link" type="text" placeholder="Task Link (https://...)" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="t-type" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm">
                        <option value="facebook">Facebook Follow</option>
                        <option value="youtube">YouTube Video</option>
                        <option value="website">Website Visit</option>
                    </select>
                    <input id="t-time" type="number" placeholder="Timer (e.g. 60)" class="bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500">
                </div>

                <button onclick="addTask()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">
                    Publish Task
                </button>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-800 mb-6">Active Tasks</h3>
                <div id="admin-task-list" class="space-y-4">
                    </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // পাসওয়ার্ড চেক করার ফাংশন
        function checkPass() {
            const pass = document.getElementById('admin-pass').value;
            const correctPass = "@#MdD596@#"; // আপনার দেওয়া পাসওয়ার্ড

            if(pass === correctPass) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadTasks();
            } else {
                alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।");
            }
        }

        // টাস্ক যোগ করার ফাংশন
        window.addTask = function() {
            const title = document.getElementById('t-title').value;
            const reward = document.getElementById('t-reward').value;
            const link = document.getElementById('t-link').value;
            const type = document.getElementById('t-type').value;
            const time = document.getElementById('t-time').value || 60;

            if(title && reward && link) {
                db.ref('tasks').push({
                    title: title,
                    reward: parseFloat(reward),
                    link: link,
                    type: type,
                    time: time + "s"
                }).then(() => {
                    alert("টাস্ক সফলভাবে যোগ হয়েছে!");
                    document.getElementById('t-title').value = "";
                    document.getElementById('t-reward').value = "";
                    document.getElementById('t-link').value = "";
                });
            } else {
                alert("সবগুলো বক্স পূরণ করুন!");
            }
        }

        // টাস্ক লোড এবং ডিলিট করার লজিক
        function loadTasks() {
            db.ref('tasks').on('value', snap => {
                const tasks = snap.val();
                const container = document.getElementById('admin-task-list');
                if(!tasks) { container.innerHTML = "<p class='text-gray-400 italic text-sm'>No tasks active.</p>"; return; }

                container.innerHTML = Object.keys(tasks).map(key => `
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-blue-600">${tasks[key].type === 'youtube' ? 'play_circle' : 'language'}</span>
                            <div>
                                <p class="text-sm font-bold">${tasks[key].title}</p>
                                <p class="text-[10px] text-gray-400">৳${tasks[key].reward} • ${tasks[key].time}</p>
                            </div>
                        </div>
                        <button onclick="deleteTask('${key}')" class="text-red-500 hover:bg-red-50 p-2 rounded-xl">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </div>
                `).join('');
            });
        }

        window.deleteTask = function(id) {
            if(confirm("মুছে ফেলতে চান?")) db.ref('tasks/' + id).remove();
        }
    </script>
</body>
</html>
