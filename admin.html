<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Login | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 p-6">

    <div class="max-w-xl mx-auto">
        <div id="login-card" class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 space-y-6">
            <div class="text-center">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="material-symbols-outlined text-3xl">admin_panel_settings</span>
                </div>
                <h1 class="text-2xl font-black text-slate-800">Admin Login</h1>
                <p class="text-sm text-slate-500">অ্যাডমিন হিসেবে সাইন-ইন করুন</p>
            </div>

            <div class="space-y-4">
                <input id="admin-email" type="email" placeholder="Email Address" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input id="admin-password" type="password" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="loginAdmin()" id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
                    Login to Dashboard
                </button>
            </div>
        </div>

        <div id="admin-dashboard" class="hidden space-y-8">
            <div class="flex items-center justify-between bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h1 class="text-xl font-bold text-slate-800">Admin Panel</h1>
                <button onclick="logoutAdmin()" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl font-bold text-sm">Logout</button>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <h2 class="font-bold text-slate-800">Publish New Task</h2>
                <input id="t-title" type="text" placeholder="Task Title" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-blue-500">
                <input id="t-reward" type="number" step="0.01" placeholder="Reward Amount (৳)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-blue-500">
                <input id="t-link" type="text" placeholder="Target Link (URL)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-blue-500">
                <select id="t-type" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <option value="facebook">Facebook Follow</option>
                    <option value="youtube">YouTube Video</option>
                    <option value="website">Website Visit</option>
                </select>
                <input id="t-time" type="number" placeholder="Timer (Seconds)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-blue-500">
                <button onclick="addTask()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Publish Task</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ১. লগইন ফাংশন
        function loginAdmin() {
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const btn = document.getElementById('login-btn');

            if(!email || !password) return alert("ইমেইল এবং পাসওয়ার্ড দিন।");
            btn.innerText = "Authenticating...";

            auth.signInWithEmailAndPassword(email, password)
                .catch(err => {
                    alert("Error: " + err.message);
                    btn.innerText = "Login to Dashboard";
                });
        }

        // ২. লগআউট ফাংশন
        function logoutAdmin() {
            auth.signOut().then(() => location.reload());
        }

        // ৩. Auth State Check (লগইন থাকলে ড্যাশবোর্ড দেখাবে)
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
            } else {
                document.getElementById('login-card').classList.remove('hidden');
                document.getElementById('admin-dashboard').classList.add('hidden');
            }
        });

        // ৪. টাস্ক যোগ করার ফাংশন (এখন এটি কাজ করবে কারণ ইউজার লগইন করা)
        function addTask() {
            const title = document.getElementById('t-title').value;
            const reward = document.getElementById('t-reward').value;
            const link = document.getElementById('t-link').value;
            const type = document.getElementById('t-type').value;
            const time = document.getElementById('t-time').value || 60;

            if(title && reward && link) {
                db.ref('tasks').push({
                    title: title,
                    reward: parseFloat(reward),
                    link: link,
                    type: type,
                    time: time + "s"
                }).then(() => {
                    alert("টাস্ক সফলভাবে পাবলিশ হয়েছে!");
                    document.getElementById('t-title').value = "";
                    document.getElementById('t-reward').value = "";
                    document.getElementById('t-link').value = "";
                }).catch(err => alert("পাবলিশ ব্যর্থ: " + err.message));
            } else {
                alert("সবগুলো বক্স পূরণ করুন!");
            }
        }
    </script>
</body>
</html>
