<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Panel | Prosper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto space-y-8">
        <div class="flex items-center justify-between bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-2xl font-black font-headline text-slate-800">Admin Dashboard</h1>
                <p class="text-sm text-slate-500">Manage your app tasks easily</p>
            </div>
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <span class="material-symbols-outlined text-2xl">admin_panel_settings</span>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 space-y-5">
            <h3 class="font-bold text-slate-800 flex items-center gap-2">
                <span class="material-symbols-outlined text-blue-600">add_task</span> নতুন টাস্ক যোগ করুন
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Task Title</label>
                    <input id="t-title" type="text" placeholder="যেমন: YouTube Subscribe" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Reward (৳)</label>
                    <input id="t-reward" type="number" step="0.01" placeholder="যেমন: 0.50 বা 1.00" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Task Link</label>
                <input id="t-link" type="text" placeholder="https://facebook.com/yourpage" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Task Type</label>
                    <select id="t-type" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500">
                        <option value="facebook">Facebook Follow</option>
                        <option value="youtube">YouTube Sub/Watch</option>
                        <option value="website">Website Visit</option>
                        <option value="instagram">Instagram Follow</option>
                        <option value="tiktok">TikTok Follow</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Timer (Seconds)</label>
                    <input id="t-time" type="number" placeholder="যেমন: 30 বা 60" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <button onclick="addTask()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 transition-all active:scale-95">
                Publish Task
            </button>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-6">Active Tasks</h3>
            <div id="admin-task-list" class="space-y-4">
                <p class="text-center text-slate-400 text-sm italic">Loading tasks...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
            authDomain: "onlineincome-326f9.firebaseapp.com",
            databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
            projectId: "onlineincome-326f9",
            storageBucket: "onlineincome-326f9.firebasestorage.app",
            messagingSenderId: "79088960253",
            appId: "1:79088960253:web:4a39dbe9d3207ccca1f494"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // টাস্ক যোগ করার ফাংশন
        window.addTask = function() {
            const title = document.getElementById('t-title').value;
            const reward = document.getElementById('t-reward').value;
            const link = document.getElementById('t-link').value;
            const type = document.getElementById('t-type').value;
            const time = document.getElementById('t-time').value || 60;

            if(title && reward && link) {
                const tasksRef = db.ref('tasks');
                const newTaskRef = tasksRef.push(); // এটি অটোমেটিক ইউনিক আইডি তৈরি করবে
                
                newTaskRef.set({
                    title: title,
                    reward: parseFloat(reward),
                    link: link,
                    type: type,
                    time: time + "s",
                    status: "New"
                }).then(() => {
                    alert("টাস্ক সফলভাবে পাবলিশ হয়েছে!");
                    document.getElementById('t-title').value = "";
                    document.getElementById('t-reward').value = "";
                    document.getElementById('t-link').value = "";
                }).catch(err => alert("Error: " + err.message));
            } else {
                alert("দয়া করে সব তথ্য পূরণ করুন!");
            }
        }

        // টাস্ক ডিলিট করার ফাংশন
        window.deleteTask = function(id) {
            if(confirm("এই টাস্কটি কি মুছে ফেলতে চান?")) {
                db.ref('tasks/' + id).remove();
            }
        }

        // টাস্ক লিস্ট আপডেট দেখানো
        db.ref('tasks').on('value', snap => {
            const tasks = snap.val();
            const container = document.getElementById('admin-task-list');
            
            if(!tasks) {
                container.innerHTML = "<p class='text-center text-slate-400 text-sm'>No tasks active.</p>";
                return;
            }

            container.innerHTML = Object.keys(tasks).map(key => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-blue-600 bg-blue-50 p-2 rounded-xl text-sm">
                            ${tasks[key].type === 'facebook' ? 'facebook' : tasks[key].type === 'youtube' ? 'play_circle' : 'language'}
                        </span>
                        <div>
                            <p class="text-sm font-bold text-slate-800">${tasks[key].title}</p>
                            <p class="text-[10px] text-slate-400">৳${tasks[key].reward} • ${tasks[key].time}</p>
                        </div>
                    </div>
                    <button onclick="deleteTask('${key}')" class="text-red-500 hover:bg-red-50 p-2 rounded-xl transition-all">
                        <span class="material-symbols-outlined text-sm">delete</span>
                    </button>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
