<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-gray-100 p-6">

<div id="login-card" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
<h2 class="text-xl font-bold mb-4 text-center">Admin Login</h2>
<input id="email" placeholder="Email" class="w-full p-3 border mb-3">
<input id="pass" type="password" placeholder="Password" class="w-full p-3 border mb-3">
<button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded">Login</button>
</div>

<div id="dashboard" class="hidden max-w-md mx-auto space-y-4">

<h2 class="text-xl font-bold">Admin Dashboard</h2>

<input id="title" placeholder="Task Title" class="w-full p-3 border">
<input id="reward" type="number" placeholder="Reward" class="w-full p-3 border">
<input id="link" placeholder="Link" class="w-full p-3 border">

<button onclick="addTask()" class="w-full bg-green-600 text-white p-3 rounded">Add Task</button>

<h3 class="font-bold mt-6">Withdraw Requests</h3>
<div id="withdraw-list"></div>

<button onclick="logout()" class="w-full bg-red-500 text-white p-3 rounded">Logout</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAtYq8JTQXdMmrwhc3W96g7KfqThZcTA_4",
authDomain: "onlineincome-326f9.firebaseapp.com",
databaseURL: "https://onlineincome-326f9-default-rtdb.firebaseio.com",
projectId: "onlineincome-326f9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function login(){
auth.signInWithEmailAndPassword(
document.getElementById('email').value,
document.getElementById('pass').value
).catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
if(user){
db.ref('admins/'+user.uid).once('value').then(snap=>{
if(snap.exists()){
document.getElementById('login-card').style.display="none";
document.getElementById('dashboard').style.display="block";
loadWithdraw();
}else{
alert("Not Admin");
auth.signOut();
}
});
}
});

function addTask(){
const t = title.value;
const r = parseFloat(reward.value);
const l = link.value;

if(!t || !r || !l) return alert("Fill all");

db.ref('tasks').push({title:t,reward:r,link:l});
alert("Task Added");
}

function loadWithdraw(){
db.ref('withdrawRequests').on('value',snap=>{
let html="";
const data=snap.val();

for(let uid in data){
for(let id in data[uid]){
let w=data[uid][id];
html+=`
<div class="bg-white p-3 mb-2">
<p>৳${w.amount} - ${w.number}</p>
<button onclick="approve('${uid}','${id}',${w.amount})">Approve</button>
<button onclick="reject('${uid}','${id}')">Reject</button>
</div>`;
}
}
withdraw-list.innerHTML=html;
});
}

function approve(uid,id,amount){
db.ref('withdrawRequests/'+uid+'/'+id+'/status').set('approved');
db.ref('users/'+uid+'/balance').transaction(b=>(b||0)-amount);
}

function reject(uid,id){
db.ref('withdrawRequests/'+uid+'/'+id+'/status').set('rejected');
}

function logout(){
auth.signOut();
location.reload();
}
</script>

</body>
</html>
